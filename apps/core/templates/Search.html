<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZentroConnect</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0F1B2D;
      color: #F8FAFC;
    }

    /* ================= NAVBAR ================= */
    .navbar {
      height: 70px;
      background: #0B1220;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      border-bottom: 1px solid #1E293B;
      z-index: 1000;
    }

    .logo {
      font-weight: 600;
      font-size: 20px;
      color: #1E90FF;
    }

    .settings {
      position: absolute;
      right: 30px;
      font-size: 20px;
      color: #94A3B8;
      cursor: pointer;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 70px;
      background: #0B1220;
      border-radius: 0px 16px 16px 0px;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.3s ease;
      justify-content: center;
    }

    .sidebar:hover {
      display: flex;
      height: 650px;
      width: 200px;
      border-radius: 0px 16px 16px 0px;

    }

    .sidebar a {
      width: 100%;
      text-decoration: none;
    }

    .side-item {
      width: 100%;
      padding: 20px;
      cursor: pointer;
      color: #94A3B8;
      transition: 0.2s;
    }

    .side-item:hover {
      background: #1E293B;
      color: #1E90FF;
    }

    .side-text {
      display: none;
      opacity: 0;
      transition: 0.9s;
      white-space: nowrap;
    }

    .sidebar:hover .side-text {
      display: inline-block;
      opacity: 1;
    }

    /* ================= MAIN CONTAINER ================= */
    .main {
      margin-top: 90px;
      display: flex;
      justify-content: center;
    }

    .feed-container {
      width: 650px;
    }

    /* ================= POST CARD ================= */
    .post {
      background: #1E293B;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #334155;
      margin-right: 12px;
    }

    .user-info h4 {
      font-size: 15px;
      font-weight: 600;
    }

    .user-info span {
      font-size: 12px;
      color: #94A3B8;
    }

    .post-content {
      font-size: 14px;
      line-height: 1.6;
      color: #CBD5E1;
      margin-bottom: 12px;
    }

    .post img {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 25px;
      padding: 10px 0;
      border-top: 1px solid #334155;
      border-bottom: 1px solid #334155;
      margin-bottom: 12px;
    }

    .actions span {
      cursor: pointer;
      color: #94A3B8;
      transition: 0.2s;
    }

    .actions span:hover {
      color: #1E90FF;
    }

    .comment-preview {
      font-size: 13px;
      color: #94A3B8;
    }

    .card {
      width: 100%;
      margin: 5px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 25px;
      border: 2px solid #44576a;
      background: linear-gradient(135deg, #1f2a44, #24334f);
      border-radius: 25px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      background: #0d1b2a;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .content h2 {
      margin: 0;
      font-size: 18px;
      color: #ffffff;
    }

    .content p {
      margin-top: 8px;
      color: #cfd8dc;
      font-size: 8px;
      line-height: 1.5;
      max-width: 420px;
    }

    /* Search Container */
    .search-container {
      margin: 0px 0px 30px 0px;
      width: 100%;
      background: linear-gradient(90deg, #0f1b2e, #16243a);
      border-radius: 40px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    /* Input Field */
    .search-container input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 16px;
    }

    /* Placeholder */
    .search-container input::placeholder {
      color: #94a3b8;
    }

    /* Search Icon */
    .search-icon {
      font-size: 20px;
      color: #ffffff;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .search-icon:hover {
      transform: scale(1.1);
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">ZentroConnect</div>
    <div class="settings">⚙</div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <a href="/home">
      <div class="side-item">🏠 <span class="side-text">Home</span></div>
    </a>
    <a href="/search">
      <div class="side-item">🔍 <span class="side-text">Search</span></div>
    </a>
    <a href="/create-post">
      <div class="side-item">➕ <span class="side-text">Create</span></div>
    </a>
    <a href="/profile">
      <div class="side-item">👤 <span class="side-text">Profile</span></div>
    </a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div id="main-container" class="feed-container">
      <div class="search-container">
        <input id="search-bar" type="text" placeholder="Search">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
      </div>
      <div id="result-container" class="feed-container">

      </div>

    </div>
  </div>


  </div>
  </div>
  <script>

    fetch('http://127.0.0.1:8000/api/accounts/user/', {
      method: "GET",
      headers: {
        "Content-Type": "application/json"
      }
    }).then(res => res.json()).then(data => {
      console.log(data)
      for (let i = 0; data.data.length > i; i++) {
        document.getElementById('result-container').innerHTML += `<div class="card">
  <div class="avatar" style="background-image: url(${data['data'][i]['profile_pic']}); background-size: cover;">
  </div>

  <div class="content">
    <h2>${data['data'][i]['username']}</h2>
    <p>
      ${data['data'][i]['bio']}
    </p>
  </div>`
      }
    })

    document

    document.getElementById('search-bar').addEventListener('keyup', (event) => {
      console.log("EVENT");
      fetch(`http://127.0.0.1:8000/api/accounts/user/?q=${document.getElementById('search-bar').value}`)
        .then(res => res.json())
        .then(data => {
          console.log(data)
          document.getElementById('result-container').innerHTML = ""
          for (let i = 0; data.data.length > i; i++) {
            document.getElementById('result-container').innerHTML += `<div class="card">
                        <div class="avatar" style="background-image: url(${data['data'][i]['profile_pic']})"></div>

                        <div class="content">
                          <h2>${data['data'][i]['username']}</h2>
                          <p>
                            ${data['data'][i]['bio']}
                          </p>
                        </div>`
          }
        })
    })

    
  </script>
</body>

</html>
